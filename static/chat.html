<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LM Studio</title>
<link rel="stylesheet"
  href="/vendor/github.min.css"
  media="(prefers-color-scheme: light)">
<link rel="stylesheet"
  href="/vendor/github-dark.min.css"
  media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="/static/chat.css">
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/highlight.min.js"></script>
</head><body>
<div id="status"><div class="spinner"></div><span>Thinking&#x2026;</span></div>
<div id="thinking-wrapper">
  <div id="thinking-header"><span class="chevron">&#x25BC;</span><span class="label">Thinking&#x2026;</span></div>
  <div id="thinking"></div>
</div>
<div id="response" class="streaming"></div>
<form id="followup" autocomplete="off">
  <label for="followup-input">Ask a follow-up</label>
  <div class="row">
    <input id="followup-input" type="text" placeholder="e.g. summarize this website" maxlength="2000">
    <button id="followup-send" type="submit">Ask</button>
  </div>
</form>
<div id="error"></div>
<script src="/static/chat.js"></script>
</body></html>
